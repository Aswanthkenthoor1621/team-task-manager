<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - TaskManager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <h2>📋 TaskManager</h2>
    <div class="user-info">
      <span id="user-name"></span>
      <span id="user-badge" class="badge"></span>
      <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <h3 id="stat-total">0</h3>
        <p>Total Tasks</p>
      </div>
      <div class="stat-card done">
        <h3 id="stat-done">0</h3>
        <p>Completed</p>
      </div>
      <div class="stat-card overdue">
        <h3 id="stat-overdue">0</h3>
        <p>Overdue</p>
      </div>
    </div>

    <!-- TASKS PER USER -->
    <div class="section" id="user-stats-section">
      <div class="section-header">
        <h3>👥 Tasks Per User</h3>
      </div>
      <div id="user-stats-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;">
        <p style="color:#888">No data yet.</p>
      </div>
    </div>

    <!-- PROJECTS -->
    <div class="section">
      <div class="section-header">
        <h3>📁 Projects</h3>
        <button class="btn btn-primary btn-sm" onclick="openModal('project-modal')">+ New Project</button>
      </div>
      <div class="projects-grid" id="projects-grid">
        <p style="color:#888">No projects yet. Create one!</p>
      </div>
    </div>

    <!-- TASKS -->
    <div class="section" id="tasks-section" style="display:none">
      <div class="section-header">
        <h3 id="tasks-title">Tasks</h3>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="openModal('task-modal')">+ New Task</button>
          <button class="btn btn-sm" style="background:#667eea;color:white" id="manage-members-btn" onclick="openModal('members-modal')">👥 Members</button>
        </div>
      </div>
      <div class="task-columns">
        <div class="task-col">
          <h4>📝 To Do</h4>
          <div id="col-todo"></div>
        </div>
        <div class="task-col">
          <h4>⚙️ In Progress</h4>
          <div id="col-inprogress"></div>
        </div>
        <div class="task-col">
          <h4>✅ Done</h4>
          <div id="col-done"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PROJECT MODAL -->
  <div class="modal-overlay" id="project-modal">
    <div class="modal">
      <h3>Create New Project</h3>
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" id="proj-name" placeholder="e.g. Website Redesign" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="proj-desc" placeholder="Brief description..." />
      </div>
      <div class="error" id="proj-error"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('project-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="createProject()">Create</button>
      </div>
    </div>
  </div>

  <!-- TASK MODAL -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal">
      <h3>Create New Task</h3>
      <div class="form-group">
        <label>Task Title</label>
        <input type="text" id="task-title" placeholder="e.g. Design homepage" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="task-desc" placeholder="Details..." />
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="task-priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="task-due" />
      </div>
      <div class="form-group">
        <label>Assign To</label>
        <select id="task-assign"></select>
      </div>
      <div class="error" id="task-error"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('task-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="createTask()">Create</button>
      </div>
    </div>
  </div>

  <!-- MEMBERS MODAL -->
  <div class="modal-overlay" id="members-modal">
    <div class="modal">
      <h3>👥 Manage Members</h3>
      <div class="form-group">
        <label>Add Member</label>
        <select id="add-member-select"></select>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-bottom:16px" onclick="addMember()">Add Member</button>
      <div class="error" id="members-error"></div>
      <h4 style="margin-bottom:12px">Current Members</h4>
      <div id="members-list"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('members-modal')">Close</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user  = JSON.parse(localStorage.getItem('user') || '{}');
    let currentProject = null;
    let allUsers = [];

    if (!token) window.location.href = '/index.html';

    document.getElementById('user-name').textContent = user.name || '';
    const badge = document.getElementById('user-badge');
    badge.textContent = user.role || 'member';
    badge.className = `badge badge-${user.role || 'member'}`;

    function api(url, method = 'GET', body = null) {
      return fetch(url, {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: body ? JSON.stringify(body) : null
      }).then(r => r.json());
    }

    function openModal(id)  { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    function logout() { localStorage.clear(); window.location.href = '/index.html'; }

    async function loadStats() {
      const s = await api('/api/stats');
      document.getElementById('stat-total').textContent   = s.total   || 0;
      document.getElementById('stat-done').textContent    = s.done    || 0;
      document.getElementById('stat-overdue').textContent = s.overdue || 0;
    }

    async function loadUserStats() {
      const data = await api('/api/userstats');
      const grid = document.getElementById('user-stats-grid');
      if (!data.length) {
        grid.innerHTML = '<p style="color:#888">No tasks assigned yet.</p>';
        return;
      }
      grid.innerHTML = data.map(u => `
        <div class="stat-card" style="text-align:left;padding:16px">
          <div style="font-weight:600;margin-bottom:8px">👤 ${u.name}</div>
          <div style="font-size:13px;color:#888">Total: <b style="color:#667eea">${u.total}</b></div>
          <div style="font-size:13px;color:#888">Done: <b style="color:#2ed573">${u.done}</b></div>
          <div style="font-size:13px;color:#888">Overdue: <b style="color:#ff4757">${u.overdue}</b></div>
        </div>
      `).join('');
    }

    async function loadProjects() {
      const projects = await api('/api/projects');
      const grid = document.getElementById('projects-grid');
      if (!projects.length) {
        grid.innerHTML = '<p style="color:#888">No projects yet. Create one!</p>';
        return;
      }
      grid.innerHTML = projects.map(p => `
        <div class="project-card ${currentProject?.id === p.id ? 'active' : ''}" onclick="selectProject(${p.id}, '${p.name}', ${p.created_by})">
          <h4>${p.name}</h4>
          <p>${p.description || 'No description'}</p>
          <div class="project-actions">
            ${p.created_by === user.id ? `<button class="btn btn-danger btn-sm" onclick="deleteProject(event,${p.id})">Delete</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    async function createProject() {
      const name = document.getElementById('proj-name').value;
      const desc = document.getElementById('proj-desc').value;
      const err  = document.getElementById('proj-error');
      if (!name) return (err.textContent = 'Name is required');
      const res = await api('/api/projects', 'POST', { name, description: desc });
      if (res.error) return (err.textContent = res.error);
      document.getElementById('proj-name').value = '';
      document.getElementById('proj-desc').value = '';
      err.textContent = '';
      closeModal('project-modal');
      loadProjects();
    }

    async function deleteProject(e, id) {
      e.stopPropagation();
      if (!confirm('Delete this project and all its tasks?')) return;
      await api(`/api/projects/${id}`, 'DELETE');
      if (currentProject?.id === id) {
        currentProject = null;
        document.getElementById('tasks-section').style.display = 'none';
      }
      loadProjects();
      loadStats();
      loadUserStats();
    }

    async function selectProject(id, name, created_by) {
      currentProject = { id, name, created_by };
      document.getElementById('tasks-title').textContent = `📁 ${name} — Tasks`;
      document.getElementById('tasks-section').style.display = 'block';
      // Show members button only for admin/creator
      document.getElementById('manage-members-btn').style.display =
        (user.role === 'admin' || created_by === user.id) ? 'block' : 'none';
      loadTasks();
      loadUsers();
      loadProjects();
    }

    async function loadTasks() {
      const tasks = await api(`/api/projects/${currentProject.id}/tasks`);
      const todo       = document.getElementById('col-todo');
      const inprogress = document.getElementById('col-inprogress');
      const done       = document.getElementById('col-done');
      todo.innerHTML = inprogress.innerHTML = done.innerHTML = '';

      const today = new Date().toISOString().split('T')[0];

      tasks.forEach(t => {
        const isOverdue = t.due_date && t.due_date < today && t.status !== 'done';
        const card = `
          <div class="task-card">
            <h5>${t.title}</h5>
            <p>${t.description || ''}</p>
            <div class="task-meta">
              <span class="tag tag-${t.priority}">${t.priority}</span>
              ${isOverdue ? '<span class="tag tag-overdue">Overdue</span>' : ''}
              ${t.due_date ? `<span class="tag" style="background:#eee">${t.due_date}</span>` : ''}
              ${t.assigned_name ? `<span class="tag" style="background:#e8f4fd;color:#2980b9">👤 ${t.assigned_name}</span>` : ''}
            </div>
            <div class="task-actions">
              ${t.status !== 'inprogress' ? `<button class="btn btn-sm" style="background:#ffeaa7" onclick="moveTask(${t.id},'inprogress')">▶ In Progress</button>` : ''}
              ${t.status !== 'done'       ? `<button class="btn btn-sm btn-success" onclick="moveTask(${t.id},'done')">✓ Done</button>` : ''}
              ${t.status !== 'todo'       ? `<button class="btn btn-sm btn-secondary" onclick="moveTask(${t.id},'todo')">↩ Todo</button>` : ''}
              <button class="btn btn-sm btn-danger" onclick="deleteTask(${t.id})">🗑</button>
            </div>
          </div>`;
        if      (t.status === 'todo')       todo.innerHTML       += card;
        else if (t.status === 'inprogress') inprogress.innerHTML += card;
        else                                done.innerHTML       += card;
      });
    }

    async function loadUsers() {
      allUsers = await api('/api/users');
      const select = document.getElementById('task-assign');
      select.innerHTML = '<option value="">Unassigned</option>' +
        allUsers.map(u => `<option value="${u.id}">${u.name} (${u.role})</option>`).join('');
    }

    async function loadMembers() {
      const members = await api(`/api/projects/${currentProject.id}/members`);
      const list = document.getElementById('members-list');
      list.innerHTML = members.map(m => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;border:1px solid #eee;border-radius:8px;margin-bottom:8px">
          <span>👤 ${m.name} <span class="badge badge-${m.role}">${m.role}</span></span>
          ${m.user_id !== user.id ? `<button class="btn btn-danger btn-sm" onclick="removeMember(${m.user_id})">Remove</button>` : '<span style="color:#888;font-size:12px">You</span>'}
        </div>
      `).join('');

      // Populate add member dropdown - only users not already members
      const memberIds = members.map(m => m.user_id);
      const nonMembers = allUsers.filter(u => !memberIds.includes(u.id));
      const addSelect = document.getElementById('add-member-select');
      addSelect.innerHTML = nonMembers.length
        ? nonMembers.map(u => `<option value="${u.id}">${u.name} (${u.role})</option>`).join('')
        : '<option value="">All users are already members</option>';
    }

    async function addMember() {
      const userId = document.getElementById('add-member-select').value;
      const err = document.getElementById('members-error');
      if (!userId) return (err.textContent = 'No user selected');
      const res = await api(`/api/projects/${currentProject.id}/members`, 'POST', { user_id: userId });
      if (res.error) return (err.textContent = res.error);
      err.textContent = '';
      loadMembers();
    }

    async function removeMember(userId) {
      if (!confirm('Remove this member?')) return;
      await api(`/api/projects/${currentProject.id}/members/${userId}`, 'DELETE');
      loadMembers();
    }

    async function createTask() {
      const title    = document.getElementById('task-title').value;
      const desc     = document.getElementById('task-desc').value;
      const priority = document.getElementById('task-priority').value;
      const due_date = document.getElementById('task-due').value;
      const assigned = document.getElementById('task-assign').value;
      const err      = document.getElementById('task-error');
      if (!title) return (err.textContent = 'Title is required');
      const res = await api(`/api/projects/${currentProject.id}/tasks`, 'POST', {
        title, description: desc, priority, due_date, assigned_to: assigned || null
      });
      if (res.error) return (err.textContent = res.error);
      document.getElementById('task-title').value = '';
      document.getElementById('task-desc').value  = '';
      document.getElementById('task-due').value   = '';
      err.textContent = '';
      closeModal('task-modal');
      loadTasks();
      loadStats();
      loadUserStats();
    }

    async function moveTask(id, status) {
      await api(`/api/tasks/${id}`, 'PATCH', { status });
      loadTasks();
      loadStats();
      loadUserStats();
    }

    async function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      await api(`/api/tasks/${id}`, 'DELETE');
      loadTasks();
      loadStats();
      loadUserStats();
    }

    // Open members modal and load members
    const originalOpenModal = openModal;
    window.openModal = function(id) {
      originalOpenModal(id);
      if (id === 'members-modal') loadMembers();
    }

    // Init
    loadStats();
    loadProjects();
    loadUserStats();
  </script>
</body>
</html>
